# ========================
# APP BASIC CONFIG
# ========================
spring.application.name=resume-ai-backend
spring.main.web-application-type=servlet
server.forward-headers-strategy=native
server.port=${PORT:8080}
server.max-http-header-size=8KB
server.max-http-post-size=2MB

# ========================
# TOMCAT SETTINGS
# ========================
server.tomcat.threads.max=200
server.tomcat.connection-timeout=120s

# ========================
# STARTUP OPTIMIZATION
# ========================
spring.main.lazy-initialization=false
spring.main.background-preinitialization=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.datasource.initialization-mode=never

# ========================
# PROFILE (do not set spring.profiles.active in properties; use env/args)
# ========================

# ========================
# Google Gemini AI config
# ========================
app.ai.gemini.api-key=AIzaSyDj5T63wuzH3FDxdchuguFi6YtZIIPNY34
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.0-flash-001}
app.ai.gemini.max-tokens=${GEMINI_MAX_TOKENS:2000}
app.ai.gemini.temperature=${GEMINI_TEMPERATURE:0.7}

# ========================
# CORS Configuration
# ========================
app.cors.allowed-origins=https://resume-frontend-18onk4fwc-dhannu128s-projects.vercel.app,http://localhost:3000,http://localhost:5173
app.cors.max-age=3600
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# ========================
# DATABASE (Disabled for Development)
# ========================
# Database configuration is disabled by default for development
# Enable only when database is needed in production

# ========================
# ACTUATOR (Production Ready)
# ========================
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.endpoint.health.probes.readiness-timeout=900s
management.endpoint.health.probes.startup-timeout=900s
# Disable custom health groups and membership validation
management.endpoint.health.validate-group-membership=false
management.health.db.enabled=false
management.health.diskspace.enabled=true
management.endpoint.health.status.order=DOWN, OUT_OF_SERVICE, UP, UNKNOWN

# ========================
# LOGGING
# ========================
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.boot.web.embedded.tomcat=INFO
logging.level.com.resume.backend=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} ${LOG_LEVEL_PATTERN:-%5p} ${PID:- } --- [%15.15t] %-40.40logger{39} : %m%n%wex

# ========================
# ADDITIONAL OPTIMIZATIONS
# ========================
# Allow app to start without a database present
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
#spring.config.activate.on-profile=prod
spring.jmx.enabled=false
spring.main.allow-circular-references=false
spring.main.register-shutdown-hook=true