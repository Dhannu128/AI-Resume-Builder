# Development Profile Configuration
spring.application.name=resume-ai-backend
server.port=8080

# Disable database for development
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Google Gemini AI config (will use MockAiClient if no API key provided)
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-1.5-flash}
app.ai.gemini.max-tokens=${GEMINI_MAX_TOKENS:2000}
app.ai.gemini.temperature=${GEMINI_TEMPERATURE:0.7}

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://resume-frontend-18onk4fwc-dhannu128s-projects.vercel.app
app.cors.max-age=3600

# Simplified actuator configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.enabled=true
management.endpoint.health.show-details=always
management.endpoint.health.validate-group-membership=false

# Logging
logging.level.root=INFO
logging.level.com.resume.backend=DEBUG

# Additional dev settings
server.error.include-message=always
server.error.include-binding-errors=always
